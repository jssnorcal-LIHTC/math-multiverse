<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 64" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Red Bull Hardline Tasmania">
  <defs>
    <linearGradient id="rbhSun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFE066"/>
      <stop offset="1" stop-color="#F2A900"/>
    </linearGradient>
    <linearGradient id="rbhBullRed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E2231A"/>
      <stop offset="1" stop-color="#A40E0E"/>
    </linearGradient>
  </defs>

  <!-- Yellow disc (Red Bull sun) -->
  <circle cx="34" cy="22" r="17" fill="url(#rbhSun)"/>

  <!-- Two charging bulls silhouette (stylized; not an exact reproduction) -->
  <!-- left bull: hindquarters left, head right -->
  <g fill="url(#rbhBullRed)">
    <!-- Body -->
    <path d="M 17 18
             Q 14 14 18 12
             Q 22 11 27 13
             L 32 16
             L 35 14
             Q 38 14 36 17
             L 34 19
             Q 33 22 30 22
             L 23 22
             Q 19 22 17 20 Z"/>
    <!-- Tail flick -->
    <path d="M 18 12 Q 14 10 13 7 Q 16 8 18 12 Z"/>
    <!-- Front leg + horns -->
    <path d="M 35 14 Q 36 11 38 12 L 39 14 Z"/>
    <path d="M 28 22 L 26 27 L 24 27 L 25 22 Z"/>
    <path d="M 22 22 L 20 27 L 18 27 L 19 22 Z"/>
  </g>
  <!-- right bull mirrored -->
  <g fill="url(#rbhBullRed)" transform="translate(68 0) scale(-1 1) translate(-34 0)">
    <path d="M 17 18
             Q 14 14 18 12
             Q 22 11 27 13
             L 32 16
             L 35 14
             Q 38 14 36 17
             L 34 19
             Q 33 22 30 22
             L 23 22
             Q 19 22 17 20 Z"/>
    <path d="M 18 12 Q 14 10 13 7 Q 16 8 18 12 Z"/>
    <path d="M 35 14 Q 36 11 38 12 L 39 14 Z"/>
    <path d="M 28 22 L 26 27 L 24 27 L 25 22 Z"/>
    <path d="M 22 22 L 20 27 L 18 27 L 19 22 Z"/>
  </g>

  <!-- "Red Bull" wordmark (small, above HARDLINE) -->
  <text x="78" y="14" font-family="'Arial Narrow', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="800" fill="#0a0a0a" letter-spacing="1.2"
        text-anchor="start">RED BULL</text>

  <!-- "HARDLINE" — bold heavy wordmark in Red Bull red -->
  <text x="78" y="32" font-family="'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="20" font-weight="900" fill="#E2231A" letter-spacing="0.5"
        text-anchor="start">HARDLINE</text>

  <!-- "TASMANIA" subtitle -->
  <text x="78" y="46" font-family="'Arial Narrow', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-size="9" font-weight="700" fill="#0a0a0a" letter-spacing="3"
        text-anchor="start">TASMANIA</text>

  <!-- Decorative accent line under HARDLINE -->
  <line x1="78" y1="36" x2="178" y2="36" stroke="#0a0a0a" stroke-width="0.8"/>
</svg>
